<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Message</title>
    <style>
        :root {
            --primary-color: #25D366;
            --primary-dark: #128C7E;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px; /* מונע זום אוטומטי באייפון */
            box-sizing: border-box;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn-whatsapp {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .btn-whatsapp:hover {
            background-color: var(--primary-dark);
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
        }

        .whatsapp-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>שליחת הודעה מהירה</h1>
    
    <div class="input-group">
        <label for="phone">מספר טלפון (ישראלי):</label>
        <input type="tel" id="phone" placeholder="למשל: 0501234567" maxlength="10">
        <div id="error" class="error-msg">נא להזין מספר ישראלי תקין</div>
    </div>

    <div class="input-group">
        <label for="message">הודעה (אופציונלי):</label>
        <textarea id="message" placeholder="כתבו כאן את ההודעה..."></textarea>
    </div>

    <button class="btn-whatsapp" onclick="sendToWhatsApp()">
        <svg class="whatsapp-icon" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.653a11.77 11.77 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
        </svg>
        שלח ב-WhatsApp
    </button>
</div>

<script>
    function sendToWhatsApp() {
        const phoneInput = document.getElementById('phone');
        const messageInput = document.getElementById('message');
        const errorDiv = document.getElementById('error');
        
        let phone = phoneInput.value.replace(/\D/g, ''); // הסרת תווים שאינם מספרים
        const message = encodeURIComponent(messageInput.value);

        // בדיקה בסיסית של מספר ישראלי (מתחיל ב-05 ומכיל 10 ספרות)
        if (phone.length === 10 && phone.startsWith('05')) {
            errorDiv.style.display = 'none';
            
            // המרה לפורמט בינלאומי: הסרת ה-0 והוספת 972
            const internationalPhone = '972' + phone.substring(1);
            
            // בניית הקישור
            const whatsappUrl = `https://wa.me/${internationalPhone}?text=${message}`;
            
            // פתיחת הקישור
            window.location.href = whatsappUrl;
        } else {
            errorDiv.style.display = 'block';
            phoneInput.style.borderColor = '#ff4d4d';
        }
    }

    // ניקוי שגיאה בעת הקלדה מחדש
    document.getElementById('phone').addEventListener('input', function() {
        this.style.borderColor = '#e1e1e1';
        document.getElementById('error').style.display = 'none';
    });
</script>

</body>

</html>
